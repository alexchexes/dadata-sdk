        @see https://dadata.ru/api/suggest/party_kz/
    SuggestPartyKzResponse:
      type: object
      properties:
        suggestions:
          type: array
          items:
            $ref: '#/components/schemas/PartyKzSuggestion'
          description: Массив подсказок или пустой массив
      required:
        - suggestions
      description: Объект с массивом подсказок
    SuggestBankPayload:
      type: object
      properties:
        query:
          type: string
          description: |-
            Текст запроса.
            @maxLength 300
          maxLength: 300
        count:
          type:
            - integer
            - 'null'
          description: |-
            Максимальное количество результатов.
            @format int32
            @minimum 1
            @maximum 20
            @default 10
          format: int32
          minimum: 1
          maximum: 20
          default: 10
        type:
          anyOf:
            - type: array
              items:
                type: string
                enum:
                  - CBR
                  - BANK
                  - BANK_BRANCH
                  - NKO
                  - NKO_BRANCH
                  - RKC
                  - TREASURY
                  - OTHER
            - type: 'null'
          description: |-
            Ограничение по типу банка.
            API принимает массив, например: `"type": ["BANK", "BANK_BRANCH"]`
            {@link https://confluence.hflabs.ru/pages/viewpage.action?pageId=262996122}
        status:
          anyOf:
            - type: array
              items:
                type: string
                enum:
                  - ACTIVE
                  - LIQUIDATED
                  - LIQUIDATING
            - type: 'null'
          description: |-
            Ограничение по статусу банка.
            API принимает массив, например: `{"status": ["LIQUIDATING"]}`

            - `ACTIVE` — действующая
            - `LIQUIDATING` — ликвидируется
            - `LIQUIDATED` — ликвидирована (не встречается)

            Статус `LIQUIDATED` в реальных данных не встречается, потому что Банк России не возвращает
            информацию о ликвидированных финансовых организациях.

            @link https://confluence.hflabs.ru/pages/viewpage.action?pageId=262996120

            @example {"status": ["LIQUIDATING"]}
          examples:
            - status:
                - LIQUIDATING
        locations:
          anyOf:
            - type: array
              items:
                $ref: '#/components/schemas/KladrIdFilter'
            - type: 'null'
          description: |-
            Ограничение по региону или городу
            API принимает массив вида `{ kladr_id: string }[]`
             {@link https://confluence.hflabs.ru/pages/viewpage.action?pageId=527106238}
        locations_boost:
          anyOf:
            - type: array
              items:
                $ref: '#/components/schemas/KladrIdFilter'
            - type: 'null'
          description: |-
            Приоритет города при ранжировании.
            API принимает массив вида `{ kladr_id: string }[]`
            {@link https://confluence.hflabs.ru/pages/viewpage.action?pageId=527106242}
      required:
        - query
      description: |-
        Параметры запроса к API "Подсказки по банкам"

        @see https://dadata.ru/api/suggest/bank/
        @see https://confluence.hflabs.ru/pages/viewpage.action?pageId=262996078
