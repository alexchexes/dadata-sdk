components:
  schemas:
    ErrorResponse:
      type: object
      properties:
        family:
          type: string
          description: asdasdsadasdas
        reason:
          type: string
          description: asdsadsadsadasd
        message:
          type: string
          description: Error message

  responses:
    BadRequest:
      description: Некорректный запрос (невалидный JSON или XML)
      content:
        application/json: { schema: { $ref: '#/components/schemas/ErrorResponse' } }

    Unauthorized:
      description: В запросе отсутствует API-ключ
      content:
        application/json: { schema: { $ref: '#/components/schemas/ErrorResponse' } }

    Forbidden:
      description: |
        В запросе указан неверный API-ключ
        Или не подтверждена почта
        Или исчерпан дневной лимит запросов (проверьте через личный кабинет или API stat/daily)
      content:
        application/json: { schema: { $ref: '#/components/schemas/ErrorResponse' } }

    NotFound:
      description: |
        Запрошенный ресурс не найден.
        Скорее всего, допущена ошибка при формировании URL для выполнения запроса
      content:
        application/json: { schema: { $ref: '#/components/schemas/ErrorResponse' } }

    MethodNotAllowed:
      description: Запрос сделан с методом, отличным от POST
      content:
        application/json: { schema: { $ref: '#/components/schemas/ErrorResponse' } }

    ContentTooLarge:
      description: Слишком большая длина запроса или слишком много условий
      content:
        application/json: { schema: { $ref: '#/components/schemas/ErrorResponse' } }

    TooManyRequests:
      description: Слишком много запросов в секунду или новых соединений в минуту
      content:
        application/json: { schema: { $ref: '#/components/schemas/ErrorResponse' } }

    InternalServerError:
      description: Произошла внутренняя ошибка сервиса
      content:
        application/json: { schema: { $ref: '#/components/schemas/ErrorResponse' } }

  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: Authorization
      description: 'Use format: Token YOUR_API_KEY'

security:
  - ApiKeyAuth: []

tags:
  - name: suggest
    description: Подсказки выполняют полнотекстовый поиск и возвращают почтовые адреса, ФИО, реквизиты компаний или банков, и другую информацию в структурированном виде.
    externalDocs: { url: https://dadata.ru/api/suggest/ }

  - name: metro
    description: Станции метро
    externalDocs: { url: https://dadata.ru/api/suggest/metro/ }

externalDocs:
  url: https://confluence.hflabs.ru/display/SGTDOC
  description: |
    Ресурс HFLabs (ДаДата) на Confluence, описывающий некоторые API «Подсказок», jQuery-плагин и коробочную версию.
    Содержит дополнительную документацию и примеры, не представленные на https://dadata.ru/api
