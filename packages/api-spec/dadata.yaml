        fias_id:
          type:
            - string
            - 'null'
          description: |-
            Ограничение по ФИАС-коду.

            Например: `"fias_id": "110d6ad9-0b64-47cf-a2ee-7e935228799c"` - Санкт-Петербург, г Пушкин

