    BankSuggestionDataAddress:
      type: object
      properties:
        value:
          type: string
          description: |-
            Адрес банка одной строкой, сокращённый по правилам, описанным здесь: {@link https://confluence.hflabs.ru/pages/viewpage.action?pageId=1105068073}
            * Стандартизован, поэтому может отличаться от записанного в справочнике БИК
        unrestricted_value:
          type: string
          description: |-
            Адрес банка одной строкой (полный, с индексом).
            * Стандартизован, поэтому может отличаться от записанного в справочнике БИК
        data:
          $ref: '#/components/schemas/BankSuggestionAddressData'
          description: Подробности об адресе банка
      required:
        - value
        - unrestricted_value
        - data
      description: '`suggestions[ ]data.address` object returned from `suggest/bank` и `findById/bank` API'
    BankStateInfo:
      type: object
      properties:
        actuality_date:
          type:
            - integer
            - 'null'
          description: |-
            дата актуальности сведений (unix-время в миллисекундах)
            @format int64
          format: int64
        registration_date:
          type:
            - integer
            - 'null'
          description: |-
            дата регистрации (unix-время в миллисекундах)
            @format int64
          format: int64
        liquidation_date:
          type:
            - integer
            - 'null'
          description: |-
            дата ликвидации (unix-время в миллисекундах)
            @format int64
          format: int64
        status:
          type: string
          enum:
            - ACTIVE
            - LIQUIDATED
            - LIQUIDATING
          description: |-
            Статус финансовой организации
            - `ACTIVE` — действующая
            - `LIQUIDATING` — ликвидируется
            - `LIQUIDATED` — ликвидирована (не встречается)

            Статус LIQUIDATED в реальных данных не встречается, потому что Банк России не возвращает
            информацию о ликвидированных финансовых организациях.
        code:
          type:
            - string
            - 'null'
          description: |-
            Детальный статус (c декабря 2020) (часто не заполнен)
            - {@link https://github.com/hflabs/party-state/blob/master/party-state.csv}
      required:
        - actuality_date
        - registration_date
        - liquidation_date
        - status
        - code
