          type: string
          enum:
            - ACTIVE
            - BANKRUPT
            - LIQUIDATED
            - LIQUIDATING
            - REORGANIZING
            - SUSPENDED
          description: Статус организации
        type:
          type: string
          enum:
            - LEGAL
            - INDIVIDUAL
          description: Тип организации
    SuggestPartyByPayload:
      type: object
      properties:
        query:
          type: string
          description: |-
            Текст запроса.
            @maxLength 300
          maxLength: 300
        count:
          type:
            - integer
            - 'null'
          description: |-
            Максимальное количество результатов.
            @format int32
            @minimum 1
            @maximum 20
            @default 10
          format: int32
          minimum: 1
          maximum: 20
          default: 10
        filters:
          anyOf:
            - type: array
              items:
                $ref: '#/components/schemas/SuggestPartyByFilter'
            - type: 'null'
          description: |-
            Фильтрация работает по полям `status` (статус организации) и `type` (тип организации).

            Если заданы оба параметра (`status` и `type`), необходимо передавать не отдельные объекты с одним полем,
            а массив объектов, представляющий декартово произведение всех комбинаций `type` и `status`.

            ❌ Неправильно:
            `[{ type: 'LEGAL' }, { status: 'BANKRUPT' }, { status: 'SUSPENDED' }]`

            ✅ Правильно:
            `[{ type: 'LEGAL', status: 'BANKRUPT' }, { type: 'LEGAL', status: 'SUSPENDED' }]`
      required:
        - query
      description: '@see https://dadata.ru/api/suggest/party_by/'
