        '404':
          $ref: '#/components/responses/SuggestNotFound'
        '405':
          $ref: '#/components/responses/SuggestMethodNotAllowed'
        '413':
          $ref: '#/components/responses/SuggestContentTooLarge'
        '429':
          $ref: '#/components/responses/SuggestTooManyRequests'
