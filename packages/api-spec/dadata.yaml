                value:
                  query: сбербанк
      responses:
        '200':
          description: Запрос успешно обработан
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuggestBankResponse'
        '400':
          $ref: '#/components/responses/SuggestBadRequest'
        '401':
          $ref: '#/components/responses/SuggestUnauthorized'
        '403':
          $ref: '#/components/responses/SuggestForbidden'
        '404':
          $ref: '#/components/responses/SuggestNotFound'
        '405':
          $ref: '#/components/responses/SuggestMethodNotAllowed'
        '413':
          $ref: '#/components/responses/SuggestContentTooLarge'
        '429':
