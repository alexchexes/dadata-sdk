      required:
        - version
        - resources
    ServiceVersionsSuggestionsResources:
      type: object
      properties:
        ГАР:
          type: string
        IP-адреса:
          type: string
        Банки:
          type: string
        ФИАС:
          type: string
        ЕГРЮЛ:
          type: string
        ЕГРЮЛ Беларусь:
          type: string
        ЕГРЮЛ Казахстан:
          type: string
      required:
        - ГАР
        - IP-адреса
        - Банки
        - ФИАС
        - ЕГРЮЛ
        - ЕГРЮЛ Беларусь
        - ЕГРЮЛ Казахстан
    ServiceVersionsSuggestions:
      type: object
      properties:
        version:
          type: string
          description: |-
            Версия бэк-энда сервиса Подсказок
