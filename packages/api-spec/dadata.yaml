            - 'null'
            - string
          description: Тип квартиры/помещения полностью
        flat:
          type:
            - 'null'
            - string
          description: Квартира/помещение
        postal_box:
          type:
            - 'null'
            - string
          description: Абонентский ящик
        room_type:
          type:
            - 'null'
            - string
          description: |-
