      - url: https://suggestions.dadata.ru/suggestions/api/4_1/rs
    post:
      tags:
        - suggest
        - postal_unit
      summary: Подсказки по отделениям Почты России
      description: |
        Поиск выполняется по полям:
        - `postal_code` - индекс
        - `address_str` - адрес
      externalDocs:
        url: https://dadata.ru/api/suggest/postal_unit/
      operationId: suggestPostalUnit
      requestBody:
        required: true
        content:
