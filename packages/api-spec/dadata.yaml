          description: Массив подсказок или пустой массив
      required:
        - suggestions
      description: Объект с массивом подсказок
    SuggestPartyPayload:
      type: object
      properties:
        query:
          type: string
          description: |-
            Текст запроса.
            @maxLength 300
          maxLength: 300
        count:
          type:
            - integer
            - 'null'
          description: |-
            Максимальное количество результатов.
            @format int32
            @minimum 1
            @maximum 20
            @default 10
          format: int32
          minimum: 1
          maximum: 20
          default: 10
        type:
          anyOf:
            - type: string
              enum:
                - LEGAL
                - INDIVIDUAL
            - type: 'null'
          description: |-
            Фильтр по типу организации. API принимает одно из двух значений в виде строки:
            - `LEGAL` - юрлицо
            - `INDIVIDUAL` - ИП

            {@link https://confluence.hflabs.ru/pages/viewpage.action?pageId=206176337}
        status:
          anyOf:
            - type: array
              items:
                type: string
                enum:
                  - ACTIVE
                  - BANKRUPT
                  - LIQUIDATED
                  - LIQUIDATING
                  - REORGANIZING
            - type: 'null'
          description: |-
            Фильтр по статусу организации. API принимает массив. Например:
            - действующие: `["ACTIVE"]`
            - ликвидируемые и ликвидированные: `["LIQUIDATING", "LIQUIDATED"]`

            {@link https://confluence.hflabs.ru/pages/viewpage.action?pageId=206176335}
        branch_type:
          anyOf:
            - type: string
              enum:
                - MAIN
                - BRANCH
            - type: array
              items:
                type: string
                enum:
                  - MAIN
                  - BRANCH
            - type: 'null'
          description: |-
            Фильтр по типу филиала
            - `MAIN` - искать только по головным организациям
            - `BRANCH` - искать только по филиалам
