      description: Fields returned by the API when using the suggestions endpoint with the MUNICIPAL division. *
    AddressMunicipalSuggestion:
      type: object
      properties:
        value:
          type: string
          description: |-
            Адрес одной строкой (как показывается в списке подсказок),
            сокращённый по правилам, описанным здесь:
            {@link https://confluence.hflabs.ru/pages/viewpage.action?pageId=1105068073}
            * (может меняться в зависимости от текущих параметров запроса)
        unrestricted_value:
          type: string
          description: Адрес одной строкой (полный, с индексом)
        data:
          $ref: '#/components/schemas/AddressMunicipalData'
          description: Подробные поля адреса
      required:
        - data
        - unrestricted_value
        - value
      description: Объект подсказки в муниципальном делении (параметр `division`=`MUNICIPAL`)
    SuggestAddressMunicipalResponse:
      type: object
      properties:
        suggestions:
          type: array
          items:
            $ref: '#/components/schemas/AddressMunicipalSuggestion'
          description: Массив подсказок или пустой массив
      required:
        - suggestions
      description: Объект с массивом подсказок в муниципальном делении
    SuggestAddressResponse:
      anyOf:
        - $ref: '#/components/schemas/SuggestAddressAdminResponse'
        - $ref: '#/components/schemas/SuggestAddressMunicipalResponse'
      description: |-
        Ответ содержит объект с массивом подсказок или в административном (по умолчанию)
        или в муниципальном (если передано `"division": "MUNICIPAL"`) делении
    SuggestErrorResponse:
      type: object
      properties:
        family:
          type: string
          examples:
            - CLIENT_ERROR
          description: "@example 'CLIENT_ERROR'"
        reason:
          type: string
          examples:
            - Unauthorized
            - Forbidden
          description: |-
            @example 'Unauthorized'
            @example 'Forbidden'
        message:
          type: string
          examples:
            - You should provide Authorization header with your api token
            - Feature 'SUGGESTIONS' disabled for token 'XXX'. See https://dadata.userecho.com/topics/1834 for help.
            - Feature 'COMPANY' disabled for token 'XXX'.
          description: |-
            @example 'You should provide Authorization header with your api token'
            @example "Feature 'SUGGESTIONS' disabled for token 'XXX'. See https://dadata.userecho.com/topics/1834 for help."
            @example "Feature 'COMPANY' disabled for token 'XXX'."
      required:
        - family
        - reason
        - message
      description: Объект ошибки, возвращаемой эндпоинтами API `suggest`, `findById`, `findByEmail`
    BoundFias:
      type: object
      properties:
        include:
          type:
            - boolean
            - 'null'
          description: |-
            Включать ли объекты указанного в `to_bound/from_bound` в результаты.

            При `false` - подсказки, имеющие указанный в `to_bound/from_bound` уровень, исключаются из результатов.

            @default true
          default: true
        value:
          type: string
          enum:
