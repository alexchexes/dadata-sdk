components:
  responses:
    SuggestBadRequest:
      description: |
        Некорректный запрос (невалидный JSON или XML)
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/SuggestErrorResponse'
    SuggestUnauthorized:
      description: В запросе отсутствует API-ключ
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/SuggestErrorResponse'
    SuggestForbidden:
      description: |
        - В запросе указан неверный API-ключ
        - Или не подтверждена почта
        - Или исчерпан дневной лимит запросов (проверьте через ЛК или API `stat/daily`)
        - Или недостаточно средств для обработки запроса, пополните баланс (`profile/balance`)
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/SuggestErrorResponse'
    SuggestNotFound:
      description: |
        Запрошенный ресурс не найден.
        Скорее всего, допущена ошибка при формировании URL для выполнения запроса
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/SuggestErrorResponse'
    SuggestMethodNotAllowed:
      description: Запрос сделан с неподходящим для данного API HTTP-методом, например `GET` там, где разрешён только `POST`
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/SuggestErrorResponse'
    SuggestContentTooLarge:
      description: Слишком большая длина запроса или слишком много условий
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/SuggestErrorResponse'
    SuggestTooManyRequests:
      description: Слишком много запросов в секунду или новых соединений в минуту
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/SuggestErrorResponse'
    SuggestInternalServerError:
      description: Произошла внутренняя ошибка сервиса
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/SuggestErrorResponse'
    CleanBadRequest:
      description: |
        Некорректный запрос (невалидный JSON или XML)

        Для API стандартизации составных записей (`clean/record`):
        - Отсутствуют обязательные параметры `structure` или `data`.
        - В `structure` указан неподдерживаемый тип.
        - Количество полей в `data` более указанного в `structure`.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/CleanErrorResponseAlt1'
        application/problem+json:
          schema:
            $ref: '#/components/schemas/CleanErrorResponseAlt2'
    CleanUnauthorized:
      description: 'В запросе отсутствует API-ключ (`Authorization: Token ...`) или секретный ключ (`X-Secret: ...`)'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/CleanErrorResponseAlt1'
    CleanForbidden:
      description: |
        В запросе указан неверный API-ключ
        Или не подтверждена почта
        Или исчерпан дневной лимит запросов (проверьте через личный кабинет или API stat/daily)
        Или (Стандартизация) - недостаточно средств для обработки запроса, пополните баланс
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/CleanErrorResponseAlt1'
    CleanNotFound:
      description: |
        Запрошенный ресурс не найден.
        Скорее всего, допущена ошибка при формировании URL для выполнения запроса
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/CleanErrorResponseAlt1'
        application/problem+json:
          schema:
            $ref: '#/components/schemas/CleanErrorResponseAlt2'
    CleanMethodNotAllowed:
      description: Запрос сделан с неподходящим для данного API HTTP-методом, например `GET` там, где разрешён только `POST`
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/CleanErrorResponseAlt1'
        application/problem+json:
          schema:
            $ref: '#/components/schemas/CleanErrorResponseAlt2'
    CleanTooManyRequests:
      description: Слишком много запросов в секунду или новых соединений в минуту
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/CleanErrorResponseAlt1'
        application/problem+json:
          schema:
            $ref: '#/components/schemas/CleanErrorResponseAlt2'
    CleanInternalServerError:
      description: Произошла внутренняя ошибка сервиса
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/CleanErrorResponseAlt1'
        application/problem+json:
          schema:
            $ref: '#/components/schemas/CleanErrorResponseAlt2'
    ApiV2Unauthorized:
      description: |
        'Не указан, или указан неверный токен (`Authorization: Token ...`) или секретный ключ (`X-Secret: ...`)'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiV2ErrorResponse'
    ApiV2Error4XX:
      description: Ошибка запроса к API
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiV2ErrorResponse'
    ApiV2Error5XX:
      description: Ошибка сервера
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiV2ErrorResponse'
    ApiV2MethodNotAllowed:
      description: Запрос сделан недопустимым методом, например `POST` вместо `GET`
      content:
        text/html:
          schema:
            type: string
  securitySchemes:
    ApiKey:
      type: apiKey
      in: header
      name: Authorization
      description: |
        API-ключ. Полный вид заголовка: `Authorization: Token <YOUR_KEY>`. [Получить ключ](https://dadata.ru/profile/#info)
    SecretKey:
      type: apiKey
      in: header
      name: X-Secret
      description: Секретный ключ
  schemas:
    KladrIdFilter:
      type: object
      properties:
        kladr_id:
          type:
            - string
            - 'null'
      description: Объект для передачи КЛАДР-кода
    Bound:
      type: object
      properties:
        include:
          type:
            - boolean
            - 'null'
          description: |-
            Включать ли объекты указанного в `to_bound/from_bound` в результаты.

            При `false` - подсказки, имеющие указанный в `to_bound/from_bound` уровень, исключаются из результатов.

            @default true
          default: true
        value:
          type: string
          enum:
            - country
            - region
            - area
            - city
            - settlement
            - planning_structure
            - street
            - house
            - flat
          description: |-
            Возможные значения:
            - `country` - Страна
            - `region` - Регион
            - `area` - Район
            - `city` - Город
            - `settlement` - Населенный пункт
            - `planning_structure` - Планировочная структура *(в официальной документации - только для ФИАС,
            но работает также для подсказок по адресу)*
            - `street` - Улица
            - `house` - Дом
            - `flat` - Квартира (только для `to_bound`)
      required:
        - value
      description: Объект для передачи границы поиска
    LocationRestriction:
      type: object
      properties:
        country_iso_code:
          type:
            - string
            - 'null'
          description: |-
            Ограничение по ISO-коду страны в формате [ISO_3166](https://ru.wikipedia.org/wiki/ISO_3166).
            Например: `BY`.
            По умолчанию - `RU`.
            Чтобы разрешить любые страны - укажите `*`.
        region_iso_code:
          type:
            - string
            - 'null'
          description: 'ISO-код региона. Например: `BY-BR`'
        kladr_id:
          type:
            - string
            - 'null'
          description: |-
            Ограничение по КЛАДР-коду. Например:
            - `63` — Самарская обл.
            - `63000001` — г. Самара
            - `6300000100000` — г. Самара (полный код)

            Не рекомендуем использовать для объектов ниже города:
            - не слишком надежно для населенных пунктов (КЛАДР-коды н/п довольно часто меняются);
            - не работает для план. структур (они появились после того, как была придумана иерархия КЛАДР, и не вписываются в нее);
            - очень ненадежно для улиц (КЛАДР-коды улиц часто меняются);
            - не работает для домов.

            Рекомендуем использовать `fias_id` - [ограничение по ФИАС-коду](https://confluence.hflabs.ru/pages/viewpage.action?pageId=1023737930).
        postal_code:
          type:
            - string
            - 'null'
          description: |-
            Ограничение по почтовому индексу.

            @example '420000'
          examples:
            - '420000'
        fias_id:
          type:
            - string
            - 'null'
          description: |-
            Ограничение по ФИАС-коду.

            Например: `"fias_id": "110d6ad9-0b64-47cf-a2ee-7e935228799c"` - Санкт-Петербург, г Пушкин

            Ограничение по fias_id дома не поддерживается
        region_fias_id:
          type:
            - string
            - 'null'
          description: Ограничение по ФИАС-коду региона. Лучшая альтернатива - `fias_id`.
        area_fias_id:
          type:
            - string
            - 'null'
          description: Ограничение по ФИАС-коду административного района. Лучшая альтернатива - `fias_id`.
        sub_area_fias_id:
          type:
            - string
            - 'null'
          description: Ограничение по ФИАС-коду муниципального поселения. Лучшая альтернатива - `fias_id`.
        city_fias_id:
          type:
            - string
            - 'null'
          description: Ограничение по ФИАС-коду города. Лучшая альтернатива - `fias_id`.
        city_district_fias_id:
          type:
            - string
            - 'null'
          description: Ограничение по ФИАС-коду района города. Лучшая альтернатива - `fias_id`.
        settlement_fias_id:
          type:
            - string
            - 'null'
          description: Ограничение по ФИАС-коду населённого пункта. Лучшая альтернатива - `fias_id`.
        planning_structure_fias_id:
          type:
            - string
            - 'null'
          description: |-
            Ограничение по ФИАС-коду планировочной структуры. Лучшая альтернатива - `fias_id`.
            * *не задокументировано для API адресов, только для API ФИАС, но работает*
        street_fias_id:
          type:
            - string
            - 'null'
          description: Ограничение по ФИАС-коду улицы. Лучшая альтернатива - `fias_id`.
        country:
          type:
            - string
            - 'null'
          description: Ограничение по названию страны
        region:
          type:
            - string
            - 'null'
          description: Ограничение по названию региона
        area:
          type:
            - string
            - 'null'
          description: Ограничение по названию административного района
        sub_area:
          type:
            - string
            - 'null'
          description: Ограничение по названию муниципального поселения
        city:
          type:
            - string
            - 'null'
          description: Ограничение по названию города
        city_district:
          type:
            - string
            - 'null'
          description: |-
            Ограничение по названию района города
            * *не задокументировано для API адресов, только для API ФИАС, но работает*
        settlement:
          type:
            - string
            - 'null'
          description: Ограничение по названию населённого пункта
        planning_structure:
          type:
            - string
            - 'null'
          description: |-
            Ограничение по названию планировочной структуры
            * *не задокументировано для API адресов, только для API ФИАС, но работает*
        street:
          type:
            - string
            - 'null'
          description: Ограничение по названию улицы
        region_type_full:
          type:
            - string
            - 'null'
          description: 'Ограничение по полному типу региона, например: `республика`'
        area_type_full:
          type:
            - string
            - 'null'
          description: 'Ограничение по полному типу адм. района в регионе. Например: `улус`'
        sub_area_type_full:
          type:
            - string
            - 'null'
          description: Ограничение по полному типу муниципального поселения
        city_type_full:
          type:
            - string
            - 'null'
          description: 'Ограничение по полному типу города. Например: `поселок городского типа`'
        city_district_type_full:
          type:
            - string
            - 'null'
          description: |-
            Ограничение по полному типу района города.
            * *не задокументировано для API адресов, только для API ФИАС, но работает*
        settlement_type_full:
          type:
            - string
            - 'null'
          description: 'Ограничение по полному типу населенного пункта. Например: `деревня`'
        planning_structure_type_full:
          type:
            - string
            - 'null'
          description: |-
            Ограничение по полному типу планировочной структуры. Например: `территория снт`
            * *не задокументировано для API адресов, только для API ФИАС, но работает*
        street_type_full:
          type:
            - string
            - 'null'
          description: 'Ограничение по полному типу улицы. Например: `проспект`'
      description: |-
        Объект для передачи ограничения сектора поиска адреса.

        @see https://confluence.hflabs.ru/pages/viewpage.action?pageId=204669108
    RadiusFilter:
      type: object
      properties:
        lat:
          type:
            - string
            - number
          description: |-
            Географическая широта, например: `'59.244634'`
            @format double
          format: double
        lon:
          type:
            - string
            - number
          description: |-
            Географическая долгота, например: `'39.913355'`
            @format double
          format: double
        radius_meters:
          type:
            - number
            - 'null'
          description: |-
            Радиус поиска в метрах
            @format double
            @default 100
            @maximum 100000
          format: double
          default: 100
          maximum: 100000
      required:
        - lat
        - lon
      description: Объект для передачи фильтра по радиусу от заданной точки
    SuggestAddressPayload:
      type: object
      properties:
        query:
          type: string
          description: |-
            Текст запроса.
            @maxLength 300
          maxLength: 300
        count:
          type:
            - integer
            - 'null'
          description: |-
            Максимальное количество результатов.
            @format int32
            @minimum 1
            @maximum 20
            @default 10
          format: int32
          minimum: 1
          maximum: 20
          default: 10
        locations_boost:
          anyOf:
            - type: array
              items:
                $ref: '#/components/schemas/KladrIdFilter'
            - type: 'null'
          description: |-
            Приоритет города или региона при ранжировании.
            Передавайте код КЛАДР (kladr_id). Можно указать несколько кодов.

            @see https://confluence.hflabs.ru/pages/viewpage.action?pageId=285343795
        from_bound:
          $ref: '#/components/schemas/Bound'
          description: |-
            Гранулярные подсказки – "левая" граница.

            Если задано, ответ будет включать только объекты
            этого уровня и ниже; поиск также производится в первую очередь по объектам этого уровня и ниже.

            Примеры: если указать `from_bound = 'settlement'`:
            - Запрос `"москва"` → в результатах не будет подсказки непосредственно `"г Москва"`,
            но будут поселения и улицы, в названии которых есть "москва".
            - Запрос `"москва, 3"` → попытается найти нас.пункты и улицы с этим сочетанием
            в названии, но результаты также могут включать, например, `"г Москва, ул 3-я Бебеля"`

            Доступные границы для `from_bound`:

            - `country` - Страна
            - `region` - Регион
            - `area` - Район
            - `city` - Город
            - `settlement` - Населенный пункт
            - `planning_structure` - Планировочная структура *(в официальной документации - только для ФИАС,
            но работает также для подсказок по адресу)*
            - `street` - Улица
            - `house` - Дом

            @see https://confluence.hflabs.ru/pages/viewpage.action?pageId=222888017
        to_bound:
          $ref: '#/components/schemas/Bound'
          description: |-
            Гранулярные подсказки – "правая" граница.

            Если задано, подсказки будут только до этой границы (включительно).
            Например, чтобы исключить поиск по улицам, можно указать `to_bound = 'settlement'`,
            и при запросе `"москва новая"` результаты не будут включать `"г Москва, ул Новая"`,
            но могут включать `"Брянская обл, пос. Новая Москва"`.

            Доступные границы для `from_bound`:

            - `country` - Страна
            - `region` - Регион
            - `area` - Район
            - `city` - Город
            - `settlement` - Населенный пункт
            - `planning_structure` - Планировочная структура *(в официальной документации - только для ФИАС,
            но работает также для подсказок по адресу)*
            - `street` - Улица
            - `house` - Дом
            - `flat` - Квартира

            @see https://confluence.hflabs.ru/pages/viewpage.action?pageId=222888017
        locations:
          anyOf:
            - type: array
              items:
                $ref: '#/components/schemas/LocationRestriction'
            - type: 'null'
          description: |-
            Ограничение сектора поиска адреса.

            Чтобы искать адреса только в определенном регионе, городе, районе и т.д.,
            укажите их в параметре locations.
            Можно указать несколько ограничений, но не более 10.

            **Адрес без региона и города:**
            Чтобы адрес одной строкой в ответе (поле `value`) не содержал регион / город, заданный в ограничении,
            добавьте в запрос параметр `restrict_value` = true.

            @see https://confluence.hflabs.ru/pages/viewpage.action?pageId=204669108
        restrict_value:
          type:
            - boolean
            - 'null'
          description: |-
            Используется совместно с ограничениями (параметр `locations`), чтобы адрес в ответе
            (поле `value`) не содержал регион / город / район и т.д., заданный в ограничении.

            - @see https://confluence.hflabs.ru/pages/viewpage.action?pageId=222888017
            - @see https://confluence.hflabs.ru/pages/viewpage.action?pageId=1023737934#id-Ограничениепоназваниюадресногообъекта-Адресбезрегионаигорода
            - @see https://confluence.hflabs.ru/display/SGTDOC/address.value#address.value-Параметрrestrict_value
        locations_geo:
          anyOf:
            - type: array
              items:
                $ref: '#/components/schemas/RadiusFilter'
            - type: 'null'
          description: |-
            Ограничение по радиусу окружности.
            Позволяет искать адреса в определенном радиусе от заданной точки.
            Можно указать несколько точек.

            @see https://confluence.hflabs.ru/pages/viewpage.action?pageId=990871806
        language:
          anyOf:
            - type: string
              enum:
                - RU
                - EN
            - type: 'null'
          description: |-
            Язык результатов поиска. Поддерживается русский и английский.
            Влияет на все поля в объекте адреса.
            @default 'RU'
            @see https://confluence.hflabs.ru/pages/viewpage.action?pageId=976388726
          default: RU
        division:
          anyOf:
            - type: string
              enum:
                - ADMINISTRATIVE
                - MUNICIPAL
            - type: 'null'
          description: |-
            Административное либо муниципальное деление.

            @see https://confluence.hflabs.ru/pages/viewpage.action?pageId=1326056589
            @default 'ADMINISTRATIVE'
          default: ADMINISTRATIVE
      required:
