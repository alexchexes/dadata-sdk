    PartyAddress:
      type: object
      properties:
        value:
          type: string
          description: |-
            Адрес одной строкой, сокращённый по правилам, описанным здесь: {@link https://confluence.hflabs.ru/pages/viewpage.action?pageId=1105068073}
            - Для юрлиц: **адрес организации**
            - Для ИП: **город проживания**

            * Стандартизован, поэтому может отличаться от записанного в ЕГРЮЛ
        unrestricted_value:
          type: string
          description: |-
            Адрес одной строкой (полный, с индексом).
            - Для юрлиц: **адрес организации**
            - Для ИП: **город проживания**

            * Стандартизован, поэтому может отличаться от записанного в ЕГРЮЛ.
        invalidity:
          anyOf:
            - $ref: '#/components/schemas/InvalidityInfo'
            - type: 'null'
          description: |-
            Недостоверность сведений об адресе (только в «Организация по ИНН», Только «Максимальный» тариф)
            - {@link https://dadata.ru/api/find-party/#invalidity}
        data:
          $ref: '#/components/schemas/PartySuggestionAddressData'
          description: Подробности об адресе организации
      required:
        - value
        - unrestricted_value
        - invalidity
        - data
      description: Объект адреса (`data.address`), возвращаемый API `suggest/party` и `findById/party`
    PartyStateInfo:
      type: object
      properties:
        actuality_date:
          type: integer
          description: |-
            Дата актуальности сведений (unix-время в миллисекундах)
            @format int64
          format: int64
        registration_date:
          type: integer
          description: |-
            Дата регистрации (unix-время в миллисекундах)
            @format int64
          format: int64
        liquidation_date:
          type:
            - integer
            - 'null'
          description: |-
            Дата ликвидации (unix-время в миллисекундах)
            @format int64
          format: int64
        status:
          type: string
          enum:
            - ACTIVE
            - BANKRUPT
            - LIQUIDATED
            - LIQUIDATING
            - REORGANIZING
          description: |-
            Статус организации
            - `ACTIVE`        действующая
            - `LIQUIDATING`   ликвидируется
            - `LIQUIDATED`    ликвидирована
            - `REORGANIZING`  в процессе присоединения к другому юрлицу, с последующей ликвидацией
            - `BANKRUPT`      банкрот (с февраля 2021)
        code:
          type:
            - string
            - 'null'
          description: |-
            Детальный статус (c декабря 2020) (часто не заполнен)
            - {@link https://github.com/hflabs/party-state/blob/master/party-state.csv}
      required:
        - actuality_date
        - registration_date
        - liquidation_date
        - status
        - code
    PartyOkvedInfo:
      type: object
      properties:
        main:
          type: boolean
          description: Основной или нет
        type:
          type: string
          enum:
            - '2001'
            - '2014'
          description: Версия справочника ОКВЭД (2001 или 2014)
        code:
