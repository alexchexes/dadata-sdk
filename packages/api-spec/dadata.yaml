      type: object
      properties:
        bic:
          type: string
          description: Банковский идентификационный код (БИК) ЦБ РФ
        swift:
          type:
            - string
            - 'null'
          description: Банковский идентификационный код в системе SWIFT
        inn:
          type:
            - string
            - 'null'
          description: ИНН (20.3+)
        kpp:
          type:
            - string
            - 'null'
          description: КПП (20.3+)
        registration_number:
          type:
            - string
            - 'null'
          description: Регистрационный номер в ЦБ РФ
        correspondent_account:
          type:
            - string
            - 'null'
          description: Корреспондентский счет в ЦБ РФ
        name:
          $ref: '#/components/schemas/BankNameInfo'
          description: Наименование
        payment_city:
          type:
            - string
            - 'null'
          description: |-
            Город для платежного поручения (поля справочника Tnp + Nnp, например `г Москва 35` или `г Москва`)
            (начиная с версии 19.7)
        opf:
          $ref: '#/components/schemas/BankOpfInfo'
          description: Тип кредитной организации
        address:
          $ref: '#/components/schemas/BankSuggestionDataAddress'
          description: Адрес регистрации
        state:
          $ref: '#/components/schemas/BankStateInfo'
          description: Состояние
        treasury_accounts:
          anyOf:
            - type: array
              items:
                type: string
            - type: 'null'
          description: Казначейские счета территориального ОФК (для УФК) (21.2+)
        cbr:
          type: 'null'
          description: Управление ЦБ РФ, к которому относится банк. (Только в «Банк по ID»)
        okpo:
          type: 'null'
          description: Не заполняется
        phone:
          type: 'null'
          description: Не заполняется
        phones:
          type: 'null'
          description: Не заполняется
        rkc:
          type: 'null'
          description: Не заполняется
      required:
