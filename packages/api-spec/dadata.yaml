        url: https://dadata.ru/api/stat/
      operationId: fetchDailyStats
      responses:
        '200':
          description: Запрос успешно обработан
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DailyStats'
        '401':
          $ref: '#/components/responses/ApiV2Unauthorized'
        '405':
          $ref: '#/components/responses/ApiV2MethodNotAllowed'
        4XX:
          $ref: '#/components/responses/ApiV2Error4XX'
        5XX:
          $ref: '#/components/responses/ApiV2Error5XX'
      security:
        - ApiKey: []
          SecretKey: []
