    BankSuggestion:
      type: object
      properties:
        value:
          type: string
          description: |-
            Наименование банка.
            - Для банков (`opf.type = BANK`): краткое наименование (`data.name.short`).
              Если краткое наименование не указано — платежное наименование (`data.name.payment`).
            - Для всех остальных: платежное наименование (`data.name.payment`)
        unrestricted_value:
          type: string
          description: Наименование банка (то же, что и value)
        data:
          $ref: '#/components/schemas/BankSuggestionData'
          description: Подробности о банке
      required:
        - data
        - unrestricted_value
        - value
      description: |-
        Suggestion object returned from `suggest/bank` API
        - {@link https://dadata.ru/api/suggest/bank/}
        - {@link https://confluence.hflabs.ru/pages/viewpage.action?pageId=262996078}
    SuggestBankResponse:
      type: object
      properties:
        suggestions:
          type: array
          items:
            $ref: '#/components/schemas/BankSuggestion'
          description: Массив подсказок или пустой массив
      required:
        - suggestions
      description: Объект с массивом подсказок
    SuggestFioPayload:
      type: object
      properties:
        query:
          type: string
          description: |-
            Текст запроса.
            @maxLength 300
          maxLength: 300
        count:
          type:
            - integer
            - 'null'
          description: |-
            Максимальное количество результатов.
            @format int32
            @minimum 1
            @maximum 20
            @default 10
          format: int32
          minimum: 1
          maximum: 20
          default: 10
        gender:
          anyOf:
            - type: string
              enum:
                - MALE
                - FEMALE
                - UNKNOWN
            - type: 'null'
          description: Пол (`UNKNOWN` / `MALE` / `FEMALE`)
        parts:
          anyOf:
            - type: array
              items:
                type: string
                enum:
                  - NAME
                  - SURNAME
                  - PATRONYMIC
            - type: 'null'
          description: |-
            Подсказки по части ФИО:
            - Только имена: `["NAME"]`
            - Имена и отчества: `["NAME", "PATRONYMIC"]`
            - Имена и фамилии: `["NAME", "SURNAME"]`
      required:
        - query
      description: |-
        @see https://dadata.ru/api/suggest/name/
        @see https://confluence.hflabs.ru/pages/viewpage.action?pageId=204669111
    FioSuggestionData:
      type: object
      properties:
        surname:
          type:
            - 'null'
