  /stat/daily:
    servers:
      - url: https://dadata.ru/api/v2
    get:
      tags:
        - account
        - stats
      summary: Статистика использования
      description: |
        Возвращает агрегированную статистику и остатки за сегодняшний день по каждому из сервисов:
        - бренд по ИНН (`brand`)
        - стандартизация (`clean`)
        - компания по email (`company`)
        - поиск дублей (`merging`)
        - подсказки (`suggestions`)

        В поле `services` возвращается суммарное количество запросов, израсходованное по каждому сервису с начала суток.
        В поле `remaining` возвращается расчетное количество оставшихся запросов согласно балансу и тарифу.

        > **Вызовы к этому API из браузера запрещены CORS-политикой сервера «Дадаты».**
