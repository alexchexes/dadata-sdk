          description: |-
            Адм. район города с типом
            * В подсказках по адресам - заполняется при выборе конкретной подсказки (запрос с count=1)
        city_district_type:
          type:
            - 'null'
            - string
          description: |-
            Тип адм. района города (сокращенный)
            * В подсказках по адресам - заполняется при выборе конкретной подсказки (запрос с count=1)
        city_district_type_full:
          type:
