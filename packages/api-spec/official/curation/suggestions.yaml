comparison:
  anyOfFolding:
    - target: ours
      operation:
        path: /suggest/address
        method: post
      response:
        status: '200'
        mediaType: application/json
      schemaPath: ''
      expectedNullBranch: false
      expectedObjectBranches:
        - ref: '#/components/schemas/SuggestAddressAdminResponse'
          onlyProperties: []
          onlyRequired: []
        - ref: '#/components/schemas/SuggestAddressMunicipalResponse'
          onlyProperties: []
          onlyRequired: []
      allowedRecursiveMerges:
        - schemaPath: properties/suggestions
          kind: array
          expectedBranchCount: 2
          expectedBranchRefs: []
        - schemaPath: properties/suggestions/items
          kind: object
          expectedObjectBranches:
            - ref: '#/components/schemas/AddressAdminSuggestion'
              onlyProperties: []
              onlyRequired: []
            - ref: '#/components/schemas/AddressMunicipalSuggestion'
              onlyProperties: []
              onlyRequired: []
        - schemaPath: properties/suggestions/items/properties/data
