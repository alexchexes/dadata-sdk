                                - $ref: "#/components/schemas/Passport"
                                - $ref: "#/components/schemas/Phone"
                                - $ref: "#/components/schemas/Vehicle"
        RecordString:
            type: object
            properties:
                structure:
                    type: array
                    nullable: true
                    items:
                        type: string
                        enum:
                            - NAME
                            - ADDRESS
                            - PHONE
                            - AS_IS
                            - BIRTHDATE
                            - EMAIL
                            - VEHICLE
                            - PASSPORT
                            - SIMPLE_PARTY_NAME
                data:
                    type: array
                    nullable: true
                    items:
                        type: array
