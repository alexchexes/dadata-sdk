openapi: 3.0.1
info:
    title: Dadata Cleaner API
    version: v1
servers:
    - url: https://cleaner.dadata.ru
      description: Main cleaner server.
paths:
    /api/v1/clean/{type}:
        post:
            operationId: cleanSimple
            parameters:
                - name: type
                  in: path
                  required: true
                  schema:
                      type: string
                      enum:
                          - NAME
                          - ADDRESS
                          - PHONE
                          - AS_IS
                          - BIRTHDATE
                          - EMAIL
                          - VEHICLE
                          - PASSPORT
                          - SIMPLE_PARTY_NAME
            requestBody:
                content:
                    application/json:
                        schema:
                            type: array
                            items:
                                type: string
                required: true
            responses:
                "200":
                    description: OK
                    content:
                        application/json:
                            schema:
                                type: array
                                items:
                                    anyOf:
                                        - $ref: "#/components/schemas/Address"
                                        - $ref: "#/components/schemas/AsIs"
                                        - $ref: "#/components/schemas/Birthdate"
                                        - $ref: "#/components/schemas/Email"
                                        - $ref: "#/components/schemas/Name"
                                        - $ref: "#/components/schemas/Passport"
                                        - $ref: "#/components/schemas/Phone"
                                        - $ref: "#/components/schemas/Vehicle"
    /api/v1/clean:
        post:
            operationId: cleanRecord
            requestBody:
                content:
                    application/json:
                        schema:
                            $ref: "#/components/schemas/RecordString"
                required: true
            responses:
                "200":
                    description: OK
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/RecordEntity"
