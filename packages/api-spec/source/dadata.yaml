openapi: 3.1.1

info:
  title: DaData.ru API
  version: 0.1.0

  description: |
    [DaData](https://dadata.ru) — это сервис подсказок и поиска по российским адресам, организациям, ФИО и другим данным.

    Данная спецификация включает полный список публичных API «Дадаты» с детальным описанием формата запросов и ответов.

    _Спецификация не является официальным продуктом «Дадаты»_.

    ## Аутентификация

    - Запросы к API подсказок и «Поиск по коду» требуют передать API-ключ (токен) в заголовке `Authorization: Token <API_KEY>`. [Получить API-ключ](https://dadata.ru/profile/#info)
    - Запросы к API «Стандартизации», а также данным об аккаунте, помимо токена, требуют также указать секретный ключ в заголовке `X-Secret: <SECRET_KEY>`
      **Внимание!** Запросы к «Стандартизации» и данным аккаунта (любые запросы, где требуется заголовок `X-Secret`) недоступны из браузера.

    Некоторые сервисы являются платными. Для уточнения цен и условий ознакомьтесь с [соответствующим разделом](https://dadata.ru/pricing/) официального сайта.

    ## Лимиты запросов

    ### API «Подсказки» (`suggest`) и «Поиск по коду» (`findById`):

    - До **30 запросов в секунду** на один IP
    - До **60 новых соединений в минуту** на один IP
    - Суточные лимиты зависят от тарифного плана.

    ### API стандартизации:

    - До **20 запросов в секунду** на один IP
    - До **60 новых соединений в минуту** на один IP

    ## Важно знать

    Данная спецификация составлена на основании официального описания от DaData и анализа ответов API, но не является официальной.
    При обнаружении расхождений с официальными ресурсами, имейте в виду:

    - В некоторых случаях, данный документ исправляет неточности официальной документации.
    - Но не исключены ошибки, отставание от официальных обновлений, или ограничения, связанные с противоречиями и неполнотой официальных ресурсов.

    ## Если у вас есть вопросы:

    - По спецификации - откройте Issue и дискуссию [на GitHub](https://github.com/alexchexes/dadata-sdk)
    - Официальная поддержка «Дадаты»: [support.dadata.ru](https://support.dadata.ru/)

  contact:
    name: Dadata SDK на GitHub (unofficial)
    url: https://github.com/alexchexes/dadata-sdk

  termsOfService: https://dadata.ru/offer/

  license:
    name: Оферта «Дадаты»
    url: https://dadata.ru/offer/

externalDocs:
  url: https://dadata.ru/api/
  description: |
    Официальное описание на сайте Dadata

servers:
  - url: https://suggestions.dadata.ru/suggestions/api/4_1/rs
    description: Для сервисов «Подсказок» и «Поиск по коду»

  - url: https://cleaner.dadata.ru/api/v1
    description: Для сервисов «Стандартизации»

  - url: https://dadata.ru/api/v2
    description: Эндпоинты, связанные с аккаунтом пользователя или самой «Дадатой»

security:
  - ApiKey: []

tags:
  - name: suggest
    description: |
      «Подсказки» выполняют полнотекстовый поиск и возвращают почтовые адреса, ФИО, реквизиты компаний или банков, и другую информацию в структурированном виде.

      - [Общая информация](https://dadata.ru/suggestions/)
      - [О подключении к разным проектам](https://dadata.ru/suggestions/usage/)
      - [Список типов подсказок](https://dadata.ru/api/suggest/)
    externalDocs: { url: https://dadata.ru/api/suggest/ }

  - name: findById
    description: |
      Сервисы поиска по коду (идентификатору), как правило, используют те же справочники, что и соответствующие им сервисы «Подсказок», но позволяют получить конкретную запись или набор записей, если заранее известен необходимый идентификатор / код. Например, для сервиса «Компании РФ» это может быть ИНН или ОГРН; в каждом API - свой список поддерживаемых типов идентификаторов.

      В ряде случаев (например, при поиске организаций), получить максимально полную информацию можно используя именно «Поиск по коду».

  - name: clean
    description: |
      Сервисы стандартизации исправляют ошибки, приводят контакты к единому формату. Принимают данные строкой и отдаёт назад структурированный ответ. Отмечают мусорные сведения и те, что стоит проверить.

      - [Общая информация](https://dadata.ru/clean/)
      - [Список типов стандартизации](https://dadata.ru/api/clean/)

      > **Вызовы ко всем API стандартизации из браузера запрещены CORS-политикой сервера «Дадаты».**
    externalDocs: { url: https://dadata.ru/api/clean/ }

  - name: iplocate
    description: |
      Сервис определяет город по IP-адресу (в России). Использует IP-адрес клиента, значение из параметра ip или заголовок X-Forwarded-For.

      - Поддерживает как IPv4, так и IPv6 адреса.
      - Возвращает детальную информацию о городе, в том числе почтовый индекс.

      **Алгоритм выбора IP-адреса из параметров запроса:**

      ```
      ЕСЛИ IP указан в параметре ip
      ТО использовать его
      ИНАЧЕ
        ЕСЛИ IP указан в HTTP-заголовке X-Forwarded-For
        ТО использовать его
        ИНАЧЕ вернуть IP сокета соединения
      ```

      Местоположение определяется только для российских адресов.

  - name: cars
    x-summary: Автомобили
    description: Сервисы DaData, связанные с автомобилями

components:
  responses:
    SuggestBadRequest:
      description: |
        Некорректный запрос (невалидный JSON или XML)
      content:
        application/json:
          { schema: { $ref: '../schemas/response.json#/definitions/SuggestErrorResponse' } }

    SuggestUnauthorized:
      description: В запросе отсутствует API-ключ
      content:
        application/json:
          { schema: { $ref: '../schemas/response.json#/definitions/SuggestErrorResponse' } }

    SuggestForbidden:
      description: |
        - В запросе указан неверный API-ключ
        - Или не подтверждена почта
        - Или исчерпан дневной лимит запросов (проверьте через ЛК или API `stat/daily`)
        - Или недостаточно средств для обработки запроса, пополните баланс (`profile/balance`)
      content:
        application/json:
          { schema: { $ref: '../schemas/response.json#/definitions/SuggestErrorResponse' } }

    SuggestNotFound:
      description: |
        Запрошенный ресурс не найден.
        Скорее всего, допущена ошибка при формировании URL для выполнения запроса
      content:
        application/json:
          { schema: { $ref: '../schemas/response.json#/definitions/SuggestErrorResponse' } }

    SuggestMethodNotAllowed:
      description: Запрос сделан с неподходящим для данного API HTTP-методом, например `GET` там, где разрешён только `POST`
      content:
        application/json:
          { schema: { $ref: '../schemas/response.json#/definitions/SuggestErrorResponse' } }

    SuggestContentTooLarge:
      description: Слишком большая длина запроса или слишком много условий
      content:
        application/json:
          { schema: { $ref: '../schemas/response.json#/definitions/SuggestErrorResponse' } }

    SuggestTooManyRequests:
      description: Слишком много запросов в секунду или новых соединений в минуту
      content:
        application/json:
          { schema: { $ref: '../schemas/response.json#/definitions/SuggestErrorResponse' } }

    SuggestInternalServerError:
      description: Произошла внутренняя ошибка сервиса
      content:
        application/json:
          { schema: { $ref: '../schemas/response.json#/definitions/SuggestErrorResponse' } }

    # clean

    CleanBadRequest:
      description: |
        Некорректный запрос (невалидный JSON или XML)

        Для API стандартизации составных записей (`clean/record`):
        - Отсутствуют обязательные параметры `structure` или `data`.
        - В `structure` указан неподдерживаемый тип.
        - Количество полей в `data` более указанного в `structure`.
      content:
        application/json:
          { schema: { $ref: '../schemas/response.json#/definitions/CleanErrorResponseAlt1' } }
        application/problem+json:
          { schema: { $ref: '../schemas/response.json#/definitions/CleanErrorResponseAlt2' } }

    CleanUnauthorized:
      description: 'В запросе отсутствует API-ключ (`Authorization: Token ...`) или секретный ключ (`X-Secret: ...`)'
      content:
        application/json:
          { schema: { $ref: '../schemas/response.json#/definitions/CleanErrorResponseAlt1' } }

    CleanForbidden:
      description: |
        В запросе указан неверный API-ключ
        Или не подтверждена почта
        Или исчерпан дневной лимит запросов (проверьте через личный кабинет или API stat/daily)
        Или (Стандартизация) - недостаточно средств для обработки запроса, пополните баланс
      content:
        application/json:
          { schema: { $ref: '../schemas/response.json#/definitions/CleanErrorResponseAlt1' } }

    CleanNotFound:
      description: |
        Запрошенный ресурс не найден.
        Скорее всего, допущена ошибка при формировании URL для выполнения запроса
      content:
        application/json:
          { schema: { $ref: '../schemas/response.json#/definitions/CleanErrorResponseAlt1' } }
        application/problem+json:
          { schema: { $ref: '../schemas/response.json#/definitions/CleanErrorResponseAlt2' } }

    CleanMethodNotAllowed:
      description: Запрос сделан с неподходящим для данного API HTTP-методом, например `GET` там, где разрешён только `POST`
      content:
        application/json:
          { schema: { $ref: '../schemas/response.json#/definitions/CleanErrorResponseAlt1' } }
        application/problem+json:
          { schema: { $ref: '../schemas/response.json#/definitions/CleanErrorResponseAlt2' } }

    CleanTooManyRequests:
      description: Слишком много запросов в секунду или новых соединений в минуту
      content:
        application/json:
          { schema: { $ref: '../schemas/response.json#/definitions/CleanErrorResponseAlt1' } }
        application/problem+json:
          { schema: { $ref: '../schemas/response.json#/definitions/CleanErrorResponseAlt2' } }

    CleanInternalServerError:
      description: Произошла внутренняя ошибка сервиса
      content:
        application/json:
          { schema: { $ref: '../schemas/response.json#/definitions/CleanErrorResponseAlt1' } }
        application/problem+json:
          { schema: { $ref: '../schemas/response.json#/definitions/CleanErrorResponseAlt2' } }

    # profile

    ApiV2Unauthorized:
      description: |
        'Не указан, или указан неверный токен (`Authorization: Token ...`) или секретный ключ (`X-Secret: ...`)'
      content:
        application/json:
          { schema: { $ref: '../schemas/response.json#/definitions/ApiV2ErrorResponse' } }

    ApiV2Error4XX:
      description: Ошибка запроса к API
      content:
        application/json:
          { schema: { $ref: '../schemas/response.json#/definitions/ApiV2ErrorResponse' } }

    ApiV2Error5XX:
      description: Ошибка сервера
      content:
        application/json:
          { schema: { $ref: '../schemas/response.json#/definitions/ApiV2ErrorResponse' } }

    ApiV2MethodNotAllowed:
      description: Запрос сделан недопустимым методом, например `POST` вместо `GET`
      content: { text/html: { schema: { type: string } } }

  securitySchemes:
    ApiKey:
      type: apiKey
      in: header
      name: Authorization
      description: |
        API-ключ. Полный вид заголовка: `Authorization: Token <YOUR_KEY>`. [Получить ключ](https://dadata.ru/profile/#info)
    SecretKey:
      type: apiKey
      in: header
      name: X-Secret
      description: Секретный ключ

paths:
  /suggest/address:
    servers: [url: https://suggestions.dadata.ru/suggestions/api/4_1/rs]
    x-externalDocs:
      - url: https://dadata.ru/api/suggest/address/
      - url: https://confluence.hflabs.ru/pages/viewpage.action?pageId=204669107
      - url: https://dadata.ru/suggestions/usage/address/
    post:
      tags: [suggest, address]
      summary: Подсказки по адресам
      description: |
        Ищет адреса по любой части адреса от региона до квартиры:
        `самара авроры 7 12` → `443017, Самарская обл, г Самара, ул Авроры, д 7, кв 12`.
        Также ищет по почтовому индексу:
        `105568` → `г Москва, ул Магнитогорская`.
      externalDocs: { url: https://dadata.ru/api/suggest/address/ }
      operationId: suggestAddress
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '../schemas/request.json#/definitions/SuggestAddressPayload' }
            examples:
              Пример:
                value: { query: 'москва хабар' }
      responses:
        '200':
          description: Запрос успешно обработан
          content:
            application/json:
              { schema: { $ref: '../schemas/response.json#/definitions/SuggestAddressResponse' } }
        '400': { $ref: '#/components/responses/SuggestBadRequest' }
        '401': { $ref: '#/components/responses/SuggestUnauthorized' }
        '403': { $ref: '#/components/responses/SuggestForbidden' }
        '404': { $ref: '#/components/responses/SuggestNotFound' }
        '405': { $ref: '#/components/responses/SuggestMethodNotAllowed' }
        '413': { $ref: '#/components/responses/SuggestContentTooLarge' }
        '429': { $ref: '#/components/responses/SuggestTooManyRequests' }
        '5XX': { $ref: '#/components/responses/SuggestInternalServerError' }

  /suggest/fias:
    servers: [url: https://suggestions.dadata.ru/suggestions/api/4_1/rs]
    x-externalDocs:
      - url: https://dadata.ru/api/suggest/fias/
      - url: https://confluence.hflabs.ru/pages/viewpage.action?pageId=967835953
      - url: https://dadata.ru/suggestions/usage/fias/
    post:
      tags: [suggest, fias]
      summary: Подсказки по ФИАС
      description: |
        Ищет адреса строго по ФИАС. Нужны только если вам по какой-то причине важно точное, побуквенное соответствие справочнику адресов налоговой службы. В остальных случаях используйте Подсказки по адресу (`/suggest/address`).
      externalDocs: { url: https://dadata.ru/api/suggest/fias/ }
      operationId: suggestFias
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '../schemas/request.json#/definitions/SuggestFiasPayload' }
            examples:
              Пример:
                value: { query: 'москва хабар' }
      responses:
        '200':
          description: Запрос успешно обработан
          content:
            application/json:
              { schema: { $ref: '../schemas/response.json#/definitions/SuggestFiasResponse' } }
        '400': { $ref: '#/components/responses/SuggestBadRequest' }
        '401': { $ref: '#/components/responses/SuggestUnauthorized' }
        '403': { $ref: '#/components/responses/SuggestForbidden' }
        '404': { $ref: '#/components/responses/SuggestNotFound' }
        '405': { $ref: '#/components/responses/SuggestMethodNotAllowed' }
        '413': { $ref: '#/components/responses/SuggestContentTooLarge' }
        '429': { $ref: '#/components/responses/SuggestTooManyRequests' }
        '5XX': { $ref: '#/components/responses/SuggestInternalServerError' }

  /suggest/party:
    servers: [url: https://suggestions.dadata.ru/suggestions/api/4_1/rs]
    x-externalDocs:
      - url: https://dadata.ru/api/suggest/party/
      - url: https://confluence.hflabs.ru/pages/viewpage.action?pageId=204669122
      - url: https://dadata.ru/suggestions/usage/party/
    post:
      tags: [suggest, party]
      summary: Подсказки по организациям
      description: |
        Ищет компании и индивидуальных предпринимателей:
        - по ИНН, ОГРН и КПП;
        - названию (полному и краткому);
        - ФИО (для индивидуальных предпринимателей);
        - ФИО руководителя компании;
        - адресу до улицы
      externalDocs: { url: https://dadata.ru/api/suggest/party/ }
      operationId: suggestParty
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '../schemas/request.json#/definitions/SuggestPartyPayload' }
            examples:
              Пример:
                value: { query: 'сбербанк' }
      responses:
        '200':
          description: Запрос успешно обработан
          content:
            application/json:
              { schema: { $ref: '../schemas/response.json#/definitions/SuggestPartyResponse' } }
        '400': { $ref: '#/components/responses/SuggestBadRequest' }
        '401': { $ref: '#/components/responses/SuggestUnauthorized' }
        '403': { $ref: '#/components/responses/SuggestForbidden' }
        '404': { $ref: '#/components/responses/SuggestNotFound' }
        '405': { $ref: '#/components/responses/SuggestMethodNotAllowed' }
        '413': { $ref: '#/components/responses/SuggestContentTooLarge' }
        '429': { $ref: '#/components/responses/SuggestTooManyRequests' }
        '5XX': { $ref: '#/components/responses/SuggestInternalServerError' }

  /suggest/party_by:
    servers: [url: https://suggestions.dadata.ru/suggestions/api/4_1/rs]
    post:
      tags: [suggest, party_by]
      summary: Подсказки по организациям Беларуси
      description: |
        Подсказки по справочнику организаций и индивидуальных предпринимателей Беларуси
        Поиск выполняется по полям:
        - `unp`
        - `full_name_ru`
        - `full_name_by`
        - `short_name_ru`
        - `short_name_by`
        - `trade_name_ru`
        - `trade_name_by`
        - `address`
      externalDocs: { url: https://dadata.ru/api/suggest/party_by/ }
      operationId: suggestPartyBy
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '../schemas/request.json#/definitions/SuggestPartyByPayload' }
            examples:
              Пример:
                value: { query: 'онлайнер' }
              Только ликвидированные:
                value: { 'query': 'лар', 'filters': [{ 'status': 'LIQUIDATED' }] }
              Только ИП:
                value: { 'query': 'лар', 'filters': [{ 'type': 'INDIVIDUAL' }] }
      responses:
        '200':
          description: Запрос успешно обработан
          content:
            application/json:
              { schema: { $ref: '../schemas/response.json#/definitions/SuggestPartyByResponse' } }
        '400': { $ref: '#/components/responses/SuggestBadRequest' }
        '401': { $ref: '#/components/responses/SuggestUnauthorized' }
        '403': { $ref: '#/components/responses/SuggestForbidden' }
        '404': { $ref: '#/components/responses/SuggestNotFound' }
        '405': { $ref: '#/components/responses/SuggestMethodNotAllowed' }
        '413': { $ref: '#/components/responses/SuggestContentTooLarge' }
        '429': { $ref: '#/components/responses/SuggestTooManyRequests' }
        '5XX': { $ref: '#/components/responses/SuggestInternalServerError' }

  /suggest/party_kz:
    servers: [url: https://suggestions.dadata.ru/suggestions/api/4_1/rs]
    post:
      tags: [suggest, party_kz]
      summary: Подсказки по организациям Казахстана
      description: |
        Подсказки по справочнику организаций и индивидуальных предпринимателей Казахстана
        Поиск выполняется по полям:
        - `bin`
        - `name_ru`
        - `name_kz`
        - `fio`
        - `address_ru`
        - `address_kz`
      externalDocs: { url: https://dadata.ru/api/suggest/party_kz/ }
      operationId: suggestPartyKz
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '../schemas/request.json#/definitions/SuggestPartyKzPayload' }
            examples:
              Пример:
                value: { query: 'онлайн' }
              Филиалы иностр. юрлиц:
                value: { 'query': 'хен', 'filters': [{ 'type': 'FOREIGN_BRANCH' }] }
      responses:
        '200':
          description: Запрос успешно обработан
          content:
            application/json:
              { schema: { $ref: '../schemas/response.json#/definitions/SuggestPartyKzResponse' } }
        '400': { $ref: '#/components/responses/SuggestBadRequest' }
        '401': { $ref: '#/components/responses/SuggestUnauthorized' }
        '403': { $ref: '#/components/responses/SuggestForbidden' }
        '404': { $ref: '#/components/responses/SuggestNotFound' }
        '405': { $ref: '#/components/responses/SuggestMethodNotAllowed' }
        '413': { $ref: '#/components/responses/SuggestContentTooLarge' }
        '429': { $ref: '#/components/responses/SuggestTooManyRequests' }
        '5XX': { $ref: '#/components/responses/SuggestInternalServerError' }

  /suggest/bank:
    servers: [url: https://suggestions.dadata.ru/suggestions/api/4_1/rs]
    x-externalDocs:
      - url: https://dadata.ru/api/suggest/bank/
      - url: https://confluence.hflabs.ru/pages/viewpage.action?pageId=262996078
      - url: https://dadata.ru/suggestions/usage/bank/
    post:
      tags: [suggest, bank]
      summary: Подсказки по банкам
      description: |
        Ищет кредитные организации:
        - по БИК,
        - SWIFT,
        - ИНН,
        - ИНН + КПП,
        - названию,
        - адресу до улицы.
      externalDocs: { url: https://dadata.ru/api/suggest/bank/ }
      operationId: suggestBank
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '../schemas/request.json#/definitions/SuggestBankPayload' }
            examples:
